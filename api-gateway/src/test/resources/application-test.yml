spring:
  application:
    name: api-gateway-test

  datasource:
    url: jdbc:h2:mem:lendiq_test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

  data:
    redis:
      host: localhost
      port: 6379

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

lendiq:
  scoring:
    dt-weight: 0.40
    ml-weight: 0.35
    fairness-weight: 0.25
    approve-threshold: 700.0
    refer-threshold: 550.0
    fraud-hard-block: 0.75
  fraud:
    velocity-threshold: 5
    velocity-window-secs: 3600
    gnn-timeout-ms: 50
  ml:
    service-host: localhost:50051
    grpc-timeout-ms: 10
    model-bucket: test-bucket
    champion-path: champion/lgbm.onnx
  security:
    jwt-secret: test-secret-must-be-at-least-256-bits-long-for-hmac-sha256!!
    jwt-expiry-hours: 1
    refresh-expiry-days: 7
    admin-cidrs:
      - 127.0.0.1/32

kafka:
  topic:
    loan-apps: loan-apps
    fraud-results: fraud-results
    scoring-results: scoring-results
    lender-events: lender-events
