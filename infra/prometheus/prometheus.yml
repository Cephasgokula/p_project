global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8080"]
    metrics_path: /actuator/prometheus

  - job_name: ml-service
    static_configs:
      - targets: ["ml-service:9090"]

rule_files:
  - /etc/prometheus/alerts.yml
