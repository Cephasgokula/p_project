apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: lendiq
  labels:
    app: ml-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
        - name: ml-service
          image: ghcr.io/lendiq/ml-service:latest
          ports:
            - containerPort: 50051
            - containerPort: 9090
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: MODEL_BUCKET
              valueFrom:
                secretKeyRef:
                  name: lendiq-secrets
                  key: model-bucket
            - name: MODEL_VERSION
              valueFrom:
                configMapKeyRef:
                  name: lendiq-config
                  key: champion-model-version
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: secret-access-key
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "python -c \"import grpc; ch=grpc.insecure_channel('localhost:50051')\""
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: lendiq
spec:
  selector:
    app: ml-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: prometheus
      port: 9090
      targetPort: 9090
  type: ClusterIP
